version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: veritas-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: veritas_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - veritas-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  veritas:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: veritas-app
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: admin
      PGDATABASE: veritas_db
      JAVA_OPTS: "-Xmx512m -Xms256m"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - veritas-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  veritas-network:
    driver: bridge
