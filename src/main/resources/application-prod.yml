# ============================================================
# PRODUCTION PROFILE - Supabase (Cloud)
# ============================================================
# This profile is used for production deployment on Kubernetes.
# PostgreSQL is hosted on Supabase (managed database).
# All credentials must be provided via environment variables.
# ============================================================

spring:
  application:
    name: veritas

  # ===============================
  # = DATABASE CONFIGURATION (SUPABASE)
  # ===============================
  datasource:
    # Supabase PostgreSQL connection
    # Format: jdbc:postgresql://host:port/database?sslmode=require
    url: jdbc:postgresql://${SUPABASE_DB_HOST}:${SUPABASE_DB_PORT:5432}/${SUPABASE_DB_NAME:postgres}?sslmode=require
    username: ${SUPABASE_DB_USER}
    password: ${SUPABASE_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    
    # Connection Pool Settings
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # ===============================
  # = JPA / HIBERNATE
  # ===============================
  jpa:
    # validate: Do NOT alter the schema in production
    # update: Use only if you know what you're doing
    # none: No schema updates
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true

  # ===============================
  # = SQL INITIALIZATION (PROD)
  # ===============================
  sql:
    init:
      mode: never
      # Production never runs automatic SQL scripts

# ===============================
# = SERVER CONFIG
# ===============================
server:
  port: 8080
  servlet:
    context-path: /
  # Shutdown gracefully
  shutdown: graceful
  tomcat:
    threads:
      max: 200
      min-spare: 10

# ===============================
# = LOGGING (PROD)
# ===============================
logging:
  level:
    root: WARN
    br.edu.ifpb.veritas: INFO
    org.springframework.web: WARN
    org.springframework.security: INFO
  pattern:
    console: "%d{ISO8601} [%thread] %-5level %logger - %msg%n"
    file: "%d{ISO8601} [%thread] %-5level %logger - %msg%n"
  file:
    name: logs/veritas.log
    max-size: 100MB
    max-history: 30
