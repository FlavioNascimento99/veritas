# ============================================================
# DEVELOPMENT PROFILE - Local Docker Environment
# ============================================================
# This profile is used for local development with Docker Compose.
# PostgreSQL runs locally in a container with development data.
# ============================================================

spring:
  application:
    name: veritas

  # ===============================
  # = DATABASE CONFIGURATION (LOCAL)
  # ===============================
  datasource:
    # PostgreSQL in Docker container (docker-compose)
    url: jdbc:postgresql://${PGHOST:postgres-local}:${PGPORT:5432}/${PGDATABASE:veritas_dev}
    username: ${PGUSER:dev_user}
    password: ${PGPASSWORD:dev_password}
    driver-class-name: org.postgresql.Driver

  # ===============================
  # = JPA / HIBERNATE
  # ===============================
  jpa:
    # create-drop: Recreates schema on startup (useful for dev testing)
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        use_sql_comments: true

  # ===============================
  # = SQL INITIALIZATION (DEV)
  # ===============================
  sql:
    init:
      mode: always
      # Uncomment below if you have initial data scripts
      # data-locations: classpath:data-dev.sql

# ===============================
# = SERVER CONFIG
# ===============================
server:
  port: 8080
  servlet:
    context-path: /

# ===============================
# = LOGGING (DEV)
# ===============================
logging:
  level:
    root: INFO
    br.edu.ifpb.veritas: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
