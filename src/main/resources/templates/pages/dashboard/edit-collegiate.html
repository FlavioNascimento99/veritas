<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Colegiado</title>
</head>
<body>

<div th:fragment="content" class="p-6 bg-gray-50 min-h-screen">
    <div class="max-w-3xl mx-auto">
        <!-- Cabeçalho -->
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-900">Editar Colegiado</h1>
            <p class="text-gray-600 mt-2" th:text="'ID: ' + ${collegiate.id}"></p>
        </div>

        <!-- Aviso sobre número ímpar -->
        <div class="mb-6 p-4 bg-yellow-50 border border-yellow-200 rounded-lg">
            <p class="text-sm text-yellow-800">
                <i class="fas fa-exclamation-triangle mr-2"></i>
                <strong>Atenção:</strong> O colegiado deve ter um número ÍMPAR de membros. O sistema não permitirá salvar com número par.
            </p>
        </div>

        <!-- Formulário -->
        <div class="bg-white rounded-lg shadow-md p-8">
            <form th:action="@{/dashboard/collegiates/{id}(id=${collegiate.id})}" method="POST" class="space-y-6">
                
                <!-- Descrição -->
                <div>
                    <label for="description" class="block text-sm font-semibold text-gray-700 mb-2">
                        <i class="fas fa-file-alt mr-2"></i> Descrição *
                    </label>
                    <textarea id="description" 
                              name="description" 
                              rows="3"
                              required
                              th:value="${collegiate.description}"
                              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"></textarea>
                </div>

                <!-- Membros -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-3">
                        <i class="fas fa-users mr-2"></i> Membros * 
                        <span class="text-xs text-gray-500 ml-2">(Número ÍMPAR para evitar empates)</span>
                    </label>
                    <div class="bg-gray-50 border border-gray-300 rounded-lg p-4 space-y-3 max-h-96 overflow-y-auto">
                        <div th:each="prof : ${professors}">
                            <label class="flex items-start space-x-3 hover:bg-white p-3 rounded cursor-pointer transition border border-transparent hover:border-indigo-300">
                                <input type="checkbox" 
                                       name="collegiateMemberList" 
                                       th:value="${prof.id}"
                                       th:checked="${collegiate.collegiateMemberList != null and collegiate.collegiateMemberList.![id].contains(prof.id)}"
                                       class="mt-1 w-4 h-4 text-indigo-600 rounded border-gray-300 focus:ring-indigo-500">
                                <div class="flex-1">
                                    <p class="text-sm font-medium text-gray-900" th:text="${prof.name}"></p>
                                    <p class="text-xs text-gray-500" th:text="${prof.login}"></p>
                                </div>
                                <span th:if="${prof.coordinator}" class="bg-red-500 text-white px-2 py-1 rounded text-xs font-bold">
                                    Coordenador
                                </span>
                            </label>
                        </div>
                        <div th:if="${#lists.isEmpty(professors)}" class="text-center py-8 text-gray-500">
                            <p>Nenhum professor disponível</p>
                        </div>
                    </div>
                    <p class="text-xs text-gray-500 mt-2">
                        <i class="fas fa-info-circle mr-1"></i> Membros selecionados: <span id="memberCount" class="font-semibold">0</span> (deve ser ÍMPAR)
                    </p>
                </div>

                <!-- Informações do Colegiado -->
                <div class="p-4 bg-gray-50 rounded-lg border border-gray-200">
                    <h3 class="text-sm font-semibold text-gray-900 mb-3">Informações do Colegiado</h3>
                    <div class="grid grid-cols-2 gap-4 text-sm">
                        <div>
                            <p class="text-gray-600">Criado em:</p>
                            <p class="font-medium" th:text="${#temporals.format(collegiate.createdAt, 'dd/MM/yyyy HH:mm')}"></p>
                        </div>
                        <div>
                            <p class="text-gray-600">Reuniões associadas:</p>
                            <p class="font-medium" th:text="${collegiate.meetings != null ? collegiate.meetings.size() : 0}"></p>
                        </div>
                    </div>
                </div>

                <!-- Botões -->
                <div class="flex justify-end gap-3 pt-6 border-t border-gray-200">
                    <a th:href="@{/dashboard/collegiates}" class="px-6 py-2 text-gray-700 border border-gray-300 rounded-lg hover:bg-gray-50 font-medium transition-colors duration-200">
                        <i class="fas fa-times mr-2"></i> Cancelar
                    </a>
                    <button type="submit" class="px-6 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 font-medium flex items-center gap-2 transition-colors duration-200">
                        <i class="fas fa-save"></i> Salvar Alterações
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        function updateMemberCount() {
            const checkboxes = document.querySelectorAll('input[name="collegiateMemberList"]:checked');
            const count = checkboxes.length;
            const countElement = document.getElementById('memberCount');
            countElement.textContent = count;
            
            if (count > 0 && count % 2 === 0) {
                countElement.classList.add('text-red-600');
                countElement.classList.remove('text-green-600');
            } else if (count > 0) {
                countElement.classList.add('text-green-600');
                countElement.classList.remove('text-red-600');
            } else {
                countElement.classList.remove('text-red-600', 'text-green-600');
            }
        }
        
        const checkboxes = document.querySelectorAll('input[name="collegiateMemberList"]');
        checkboxes.forEach(checkbox => {
            checkbox.addEventListener('change', updateMemberCount);
        });
        
        updateMemberCount();
    });
</script>

</body>
</html>
