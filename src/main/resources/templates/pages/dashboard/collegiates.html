<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciar Colegiados</title>
</head>
<body>

<div th:fragment="content" class="p-6 bg-gray-50 min-h-screen">
    <div class="max-w-7xl mx-auto">
        <!-- Cabeçalho -->
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-bold text-gray-900">Gerenciar Colegiados</h1>
                <p class="text-gray-600 mt-2">Crie e gerencie os colegiados para suas reuniões</p>
            </div>
            <a th:href="@{/dashboard/collegiates/new}" class="inline-flex items-center px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors duration-200 font-semibold">
                <i class="fas fa-plus mr-2"></i> Novo Colegiado
            </a>
        </div>

        <!-- Mensagens de Feedback -->
        <div th:if="${successMessage}" class="mb-6 bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-lg flex items-center gap-3">
            <i class="fas fa-check-circle"></i>
            <span th:text="${successMessage}"></span>
        </div>
        <div th:if="${errorMessage}" class="mb-6 bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg flex items-center gap-3">
            <i class="fas fa-exclamation-circle"></i>
            <span th:text="${errorMessage}"></span>
        </div>

        <!-- Tabela de Colegiados -->
        <div class="bg-white rounded-lg shadow-md overflow-hidden">
            <div th:if="${collegiates.isEmpty()}" class="p-8 text-center">
                <i class="fas fa-inbox text-4xl text-gray-300 mb-4"></i>
                <p class="text-gray-500 text-lg">Nenhum colegiado encontrado</p>
                <a th:href="@{/dashboard/collegiates/new}" class="mt-4 inline-block px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700">
                    Criar o primeiro colegiado
                </a>
            </div>

            <div th:unless="${collegiates.isEmpty()}" class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-gradient-to-r from-indigo-600 to-indigo-700 text-white">
                        <tr>
                            <th class="px-6 py-4 text-left text-sm font-semibold">ID</th>
                            <th class="px-6 py-4 text-left text-sm font-semibold">Descrição</th>
                            <th class="px-6 py-4 text-left text-sm font-semibold">Membros</th>
                            <th class="px-6 py-4 text-left text-sm font-semibold">Reuniões</th>
                            <th class="px-6 py-4 text-left text-sm font-semibold">Criado em</th>
                            <th class="px-6 py-4 text-center text-sm font-semibold">Ações</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-200">
                        <tr th:each="collegiate : ${collegiates}" class="bg-white hover:bg-gray-50 transition-colors duration-200">
                            <td class="px-6 py-4 text-sm font-medium text-gray-900">
                                <span th:text="${collegiate.id}"></span>
                            </td>
                            <td class="px-6 py-4 text-sm text-gray-700">
                                <span th:text="${collegiate.description ?: 'Sem descrição'}"></span>
                            </td>
                            <td class="px-6 py-4 text-sm text-gray-700">
                                <span th:if="${collegiate.collegiateMemberList == null or collegiate.collegiateMemberList.isEmpty()}" class="text-gray-500 italic">Nenhum</span>
                                <div th:if="${collegiate.collegiateMemberList != null and !collegiate.collegiateMemberList.isEmpty()}" class="flex flex-wrap gap-1">
                                    <span th:each="member : ${collegiate.collegiateMemberList.size() > 3 ? collegiate.collegiateMemberList.subList(0, 3) : collegiate.collegiateMemberList}" 
                                          class="px-2 py-1 bg-indigo-100 text-indigo-800 rounded text-xs font-semibold">
                                        <span th:text="${member.name}"></span>
                                    </span>
                                    <span th:if="${collegiate.collegiateMemberList.size() > 3}" class="px-2 py-1 bg-gray-100 text-gray-800 rounded text-xs font-semibold">
                                        +<span th:text="${collegiate.collegiateMemberList.size() - 3}"></span>
                                    </span>
                                </div>
                                <span class="ml-2 text-xs text-gray-500">(<span th:text="${collegiate.collegiateMemberList != null ? collegiate.collegiateMemberList.size() : 0}"></span> total)</span>
                            </td>
                            <td class="px-6 py-4 text-sm text-gray-700">
                                <span th:if="${collegiate.meetings == null or collegiate.meetings.isEmpty()}" class="text-gray-500 italic">0 reuniões</span>
                                <span th:unless="${collegiate.meetings == null or collegiate.meetings.isEmpty()}" class="px-2 py-1 bg-blue-100 text-blue-800 rounded text-xs font-semibold">
                                    <span th:text="${collegiate.meetings.size()} + ' reunião(ões)'"></span>
                                </span>
                            </td>
                            <td class="px-6 py-4 text-sm text-gray-500">
                                <span th:if="${collegiate.createdAt != null}" th:text="${#temporals.format(collegiate.createdAt, 'dd/MM/yyyy HH:mm')}"></span>
                            </td>
                            <td class="px-6 py-4 text-center">
                                <div class="flex justify-center gap-2">
                                    <a th:href="@{/dashboard/collegiates/{id}/edit(id=${collegiate.id})}" 
                                       class="inline-flex items-center px-3 py-2 text-indigo-600 hover:bg-indigo-50 rounded transition-colors duration-200">
                                        <i class="fas fa-edit"></i>
                                    </a>
                                    <form th:action="@{/dashboard/collegiates/{id}/delete(id=${collegiate.id})}" 
                                          method="POST" 
                                          class="inline"
                                          onsubmit="return confirm('Tem certeza que deseja deletar este colegiado?');">
                                        <button type="submit" 
                                                class="inline-flex items-center px-3 py-2 text-red-600 hover:bg-red-50 rounded transition-colors duration-200">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

</body>
</html>
