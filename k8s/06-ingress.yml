# ============================================================
# Kubernetes Ingress - HTTPS + Routing
# ============================================================
# Expõe a aplicação HTTPS com domínio customizado.
# Requer Ingress Controller (nginx, traefik, etc)
#
# Pré-requisitos:
#  - Nginx Ingress Controller instalado
#  - Certificado SSL (Let's Encrypt com cert-manager)
#  - Domínio configurado (DNS pointing para ingress IP)
#
# Aplicar:
#  kubectl apply -f 06-ingress.yml
# ============================================================

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: veritas-ingress
  namespace: veritas
  labels:
    app: veritas
  annotations:
    # ===== Nginx Ingress Controller =====
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    
    # ===== Rate Limiting =====
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-connections: "20"
    
    # ===== Security =====
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    
    # ===== CORS =====
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Content-Type, Authorization"
    
    # ===== Cert Manager (para HTTPS automático) =====
    cert-manager.io/cluster-issuer: "letsencrypt-prod"

spec:
  # ========================================
  # Classe de Ingress
  # ========================================
  ingressClassName: nginx
  
  # ========================================
  # TLS/SSL Certificate
  # ========================================
  tls:
    - hosts:
        - veritas.example.com
        - api.veritas.example.com
      secretName: veritas-tls-cert
  
  # ========================================
  # Regras de Routing
  # ========================================
  rules:
    # Host: veritas.example.com
    - host: veritas.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: veritas-service
                port:
                  number: 80
    
    # Host: api.veritas.example.com (alternativo)
    - host: api.veritas.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: veritas-service
                port:
                  number: 80

---

# ========================================
# ClusterIssuer para Let's Encrypt (HTTP01)
# ========================================
# Válido em produção com domínio público

apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
  namespace: veritas
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: seu-email@example.com
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            class: nginx

---

# ========================================
# ClusterIssuer para Let's Encrypt (Staging)
# ========================================
# Use para testes (límite de rate é maior)

apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
  namespace: veritas
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: seu-email@example.com
    privateKeySecretRef:
      name: letsencrypt-staging-key
    solvers:
      - http01:
          ingress:
            class: nginx

---

