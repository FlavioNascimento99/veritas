# ============================================================
# Kubernetes PDB - Pod Disruption Budget
# ============================================================
# Garante continuidade durante:
#  - Updates do cluster (rolling updates)
#  - Manutenção de nodes
#  - Correção de bugs
#
# Evita que TODOS os pods sejam desligados simultaneamente.
# Mantém mínimo sempre rodando.
#
# Aplicar:
#  kubectl apply -f 08-pdb.yml
# ============================================================

apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: veritas-app-pdb
  namespace: veritas
  labels:
    app: veritas
spec:
  # ========================================
  # Selector (qual pods proteger)
  # ========================================
  selector:
    matchLabels:
      app: veritas
      tier: backend
  
  # ========================================
  # Mínimo de pods sempre rodando
  # ========================================
  minAvailable: 1  # Pelo menos 1 pod deve estar sempre disponível
  
  # OU (usar um OU outro, não ambos):
  # maxUnavailable: 1  # No máximo 1 pod pode ser interrompido
  
  # ========================================
  # Unhealthyful Pod Eviction Policy (K8s 1.27+)
  # ========================================
  unhealthyPodEvictionPolicy: IfHealthyBudget

---

# ========================================
# PDB alternativo com percentage
# ========================================
# Em vez de contagem fixa, use percentual

apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: veritas-app-pdb-percent
  namespace: veritas
spec:
  selector:
    matchLabels:
      app: veritas
      tier: backend
  
  # Pelo menos 50% dos pods disponíveis
  minAvailable: 50%
  
  # Ou no máximo 25% indisponível
  # maxUnavailable: 25%
