# ============================================================
# Kubernetes HPA - Horizontal Pod Autoscaler
# ============================================================
# Auto-scaling automático baseado em CPU/Memória.
# Aumenta/diminui o número de replicas conforme a carga.
#
# Pré-requisitos:
#  - Metrics Server instalado no cluster
#  - Recursos (requests/limits) definidos no Deployment
#
# Verificar Metrics Server:
#  kubectl get deployment metrics-server -n kube-system
#
# Aplicar:
#  kubectl apply -f 07-hpa.yml
# ============================================================

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: veritas-app-hpa
  namespace: veritas
  labels:
    app: veritas
spec:
  # ========================================
  # Target do Autoscaling
  # ========================================
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: veritas-app
  
  # ========================================
  # Limites de Replicas
  # ========================================
  minReplicas: 3              # Mínimo 3 pods
  maxReplicas: 10             # Máximo 10 pods
  
  # ========================================
  # Métricas (CPU e Memória)
  # ========================================
  metrics:
    # CPU Target: 70% de utilização
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    
    # Memória Target: 80% de utilização
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  
  # ========================================
  # Comportamento de Scaling
  # ========================================
  behavior:
    # Scale Up (aumentar replicas)
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100           # Dobrar o número de pods
          periodSeconds: 15
        - type: Pods
          value: 2             # Ou adicionar 2 pods
          periodSeconds: 15
      selectPolicy: Max        # Usar a política que escala mais
    
    # Scale Down (diminuir replicas)
    scaleDown:
      stabilizationWindowSeconds: 300  # Esperar 5 minutos antes de descer
      policies:
        - type: Percent
          value: 50            # Reduzir para 50% (metade)
          periodSeconds: 15
      selectPolicy: Min        # Usar a política que reduz mais devagar

---

# ========================================
# HPA com métricas customizadas (opcional)
# ========================================
# Para usar métricas de negócio (ex: requests HTTP por segundo)
# Requer Prometheus + custom metrics adapter

