# ============================================================
# Kubernetes Secret - Credenciais Supabase
# ============================================================
# Armazena credentials do banco Supabase de forma segura
# no Kubernetes. Este arquivo deve ser criado/atualizado
# via kubectl commands, NÃO deve ser commitado no git.
#
# ⚠️  IMPORTANTE:
#  - NUNCA commit este arquivo editado
#  - Use GitOps (ArgoCD) ou CI/CD para injetar valores
#  - Use encriptação de secrets (sealed-secrets, kms, etc)
#
# Criar secret manualmente:
#  kubectl create secret generic supabase-credentials \
#    --from-literal=SUPABASE_DB_HOST=db.supabase.co \
#    --from-literal=SUPABASE_DB_PORT=5432 \
#    --from-literal=SUPABASE_DB_NAME=postgres \
#    --from-literal=SUPABASE_DB_USER=postgres \
#    --from-literal=SUPABASE_DB_PASSWORD='sua_senha_supersecreto' \
#    -n veritas
#
# Ou descomente abaixo (com valores) e execute:
#  kubectl apply -f 02-secret.yml
# ============================================================

apiVersion: v1
kind: Secret
metadata:
  name: supabase-credentials
  namespace: veritas
  labels:
    app: veritas
type: Opaque
stringData:
  # ⚠️  SUBSTITUA COM SEUS VALORES REAIS
  SUPABASE_DB_HOST: "db.supabase.co"
  SUPABASE_DB_PORT: "5432"
  SUPABASE_DB_NAME: "postgres"
  SUPABASE_DB_USER: "postgres"
  SUPABASE_DB_PASSWORD: "CHANGE_ME_TO_YOUR_REAL_PASSWORD"
  
  # Connection string formatada para Spring Boot
  SPRING_DATASOURCE_URL: "jdbc:postgresql://db.supabase.co:5432/postgres?sslmode=require"

---

