# ============================================================
# Kubernetes ConfigMap - Configurações da Aplicação
# ============================================================
# Armazena configurações não-sensíveis da aplicação.
# Spring Boot carrega valores como environment variables.
#
# Aplicar:
#  kubectl apply -f 03-configmap.yml
# ============================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: veritas-config
  namespace: veritas
  labels:
    app: veritas
data:
  # ========================================
  # Spring Boot Configuration
  # ========================================
  SPRING_PROFILES_ACTIVE: "prod"
  
  # ========================================
  # Server Configuration
  # ========================================
  SERVER_PORT: "8080"
  SERVER_SERVLET_CONTEXT_PATH: "/"
  
  # ========================================
  # JPA / Hibernate
  # ========================================
  SPRING_JPA_HIBERNATE_DDL_AUTO: "validate"
  SPRING_JPA_SHOW_SQL: "false"
  SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL: "false"
  SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: "org.hibernate.dialect.PostgreSQLDialect"
  SPRING_JPA_PROPERTIES_HIBERNATE_JDBC_BATCH_SIZE: "20"
  
  # ========================================
  # SQL Initialization (Production: never)
  # ========================================
  SPRING_SQL_INIT_MODE: "never"
  
  # ========================================
  # Datasource Connection Pool
  # ========================================
  SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "20"
  SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: "5"
  SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT: "30000"
  SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT: "600000"
  SPRING_DATASOURCE_HIKARI_MAX_LIFETIME: "1800000"
  
  # ========================================
  # Logging Configuration
  # ========================================
  LOGGING_LEVEL_ROOT: "WARN"
  LOGGING_LEVEL_BR_EDU_IFPB_VERITAS: "INFO"
  LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_WEB: "WARN"
  LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY: "INFO"
  
  # ========================================
  # File Upload Configuration
  # ========================================
  SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE: "10MB"
  SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE: "10MB"
  SPRING_SERVLET_MULTIPART_ENABLED: "true"
  
  # ========================================
  # Server Tomcat Configuration
  # ========================================
  SERVER_TOMCAT_THREADS_MAX: "200"
  SERVER_TOMCAT_THREADS_MIN_SPARE: "10"
  SERVER_SHUTDOWN: "graceful"
  
  # ========================================
  # Application Info (optional but useful)
  # ========================================
  SPRING_APPLICATION_NAME: "veritas"
  APP_VERSION: "1.0.0"
  APP_ENVIRONMENT: "production"

---

# ========================================
# ConfigMap com arquivo application-prod.yml
# ========================================
# Alternativa: em vez de múltiplas env vars,
# armazene o arquivo YAML completo

apiVersion: v1
kind: ConfigMap
metadata:
  name: veritas-application-yml
  namespace: veritas
  labels:
    app: veritas
data:
  application-prod.yml: |
    spring:
      application:
        name: veritas
      profiles:
        active: prod
      
      datasource:
        url: jdbc:postgresql://${SUPABASE_DB_HOST}:${SUPABASE_DB_PORT}/${SUPABASE_DB_NAME}?sslmode=require
        username: ${SUPABASE_DB_USER}
        password: ${SUPABASE_DB_PASSWORD}
        driver-class-name: org.postgresql.Driver
        hikari:
          maximum-pool-size: 20
          minimum-idle: 5
      
      jpa:
        hibernate:
          ddl-auto: validate
        show-sql: false
        properties:
          hibernate:
            format_sql: false
            dialect: org.hibernate.dialect.PostgreSQLDialect
      
      sql:
        init:
          mode: never
    
    server:
      port: 8080
      servlet:
        context-path: /
      shutdown: graceful
      tomcat:
        threads:
          max: 200
          min-spare: 10
    
    logging:
      level:
        root: WARN
        br.edu.ifpb.veritas: INFO
      pattern:
        console: "%d{ISO8601} [%thread] %-5level %logger - %msg%n"
